spring.application.name=school
server.port=8084

# ========== TIME ZONE CONFIGURATION ==========
spring.jackson.time-zone=Asia/Kolkata
# UPDATED: Use correct property names for Jackson 3.x
spring.jackson.date-format=yyyy-MM-dd
# REMOVED: write-dates-as-timestamps is not supported in Jackson 3.x
# Instead, dates will be serialized as ISO-8601 strings by default

# ========== DATABASE CONFIGURATION ==========
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ========== JPA CONFIGURATION ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# ADD THIS: For better date handling in JPA
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ========== LOGGING CONFIGURATION ==========
logging.file.name=logs/School-Management-v1-0.log
logging.logback.rollingpolicy.max-file-size=25MB
logging.logback.rollingpolicy.max-history=10

# Enable Jackson/HTTP debug
logging.level.com.fasterxml.jackson=DEBUG
logging.level.org.springframework.web=DEBUG
# ADD THIS: Log SQL parameters for debugging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========== ENVIRONMENT CONFIGURATION ==========
spring.config.import=optional:file:.env[.properties]

# ========== MULTIPART FILE UPLOAD CONFIGURATION ==========
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.enabled=true

# ========== TOMCAT SERVER CONFIGURATION ==========
server.tomcat.max-http-form-post-size=100MB
server.tomcat.max-swallow-size=100MB
server.tomcat.max-connections=20000
server.tomcat.max-threads=200
server.tomcat.additional-tld-skip-patterns=*.jar

# ========== SECURITY CONFIGURATION ==========
logging.level.com.sc.security.SecurityConfig=DEBUG
logging.level.com.sc.security.AdminDetails=DEBUG

# ========== JWT CONFIGURATION ==========
jwt.expiration=86400000
jwt.secret=${JWT_SECRET}

# ========== EMAIL SMTP CONFIGURATION ==========
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kunashmedia4@gmail.com
spring.mail.password=jveonpceraajstwg

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true
logging.level.org.springframework.core=DEBUG


logging.level.com.sc=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLoggingListener=DEBUG